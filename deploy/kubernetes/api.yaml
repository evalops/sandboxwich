---
apiVersion: v1
kind: Namespace
metadata:
  name: sandboxwich
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sandboxwich-api-migrate
  namespace: sandboxwich
  labels:
    app.kubernetes.io/name: sandboxwich-api-migrate
    app.kubernetes.io/part-of: sandboxwich
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandboxwich-api-migrate
        app.kubernetes.io/part-of: sandboxwich
    spec:
      restartPolicy: OnFailure
      # Runs to completion once and exits; no signal handling to worry about,
      # but it gets the same pod/container hardening as the long-running api
      # Deployment below since it's the same image.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/evalops/sandboxwich-api@sha256:e722cecbe4072efbef95e6a80bfc687e90491ceeaa97a6b2ca04c88da5066c01
          imagePullPolicy: IfNotPresent
          args:
            - migrate
          env:
            - name: SANDBOXWICH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sandboxwich-secrets
                  key: database-url
            - name: SANDBOXWICH_DATABASE_MAX_CONNECTIONS
              value: "2"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandboxwich-api
  namespace: sandboxwich
  labels:
    app.kubernetes.io/name: sandboxwich-api
    app.kubernetes.io/part-of: sandboxwich
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sandboxwich-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandboxwich-api
        app.kubernetes.io/part-of: sandboxwich
    spec:
      # Bounds how long Kubernetes waits after sending SIGTERM before it force
      # kills (SIGKILL) the pod. The api now handles SIGTERM by draining
      # in-flight axum connections (see shutdown_signal()/with_graceful_shutdown
      # in main.rs); this gives that drain a real window instead of the default
      # 30s being an implicit, undocumented coincidence.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/evalops/sandboxwich-api@sha256:e722cecbe4072efbef95e6a80bfc687e90491ceeaa97a6b2ca04c88da5066c01
          imagePullPolicy: IfNotPresent
          env:
            # The instruction callback must return to the exact API process
            # holding the in-memory waiter. A Service URL would load-balance
            # callbacks across replicas and deliberately lose live bytes.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SANDBOXWICH_APEX_CALLBACK_BASE_URL
              value: http://$(POD_IP):3217
            - name: SANDBOXWICH_BIND
              value: 0.0.0.0:3217
            - name: SANDBOXWICH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sandboxwich-secrets
                  key: database-url
            - name: SANDBOXWICH_AUTO_MIGRATE
              value: "false"
            - name: SANDBOXWICH_DATABASE_MAX_CONNECTIONS
              value: "10"
            - name: SANDBOXWICH_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sandboxwich-secrets
                  key: api-token
                  optional: true
            - name: SANDBOXWICH_DEFAULT_TENANT
              value: default
          ports:
            - name: http
              containerPort: 3217
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sandboxwich-api
  namespace: sandboxwich
  labels:
    app.kubernetes.io/name: sandboxwich-api
    app.kubernetes.io/part-of: sandboxwich
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sandboxwich-api
  ports:
    - name: http
      port: 3217
      targetPort: http
---
# SECURITY.md promises deny-by-default network policy for shared deployments.
# The Kubernetes worker provider already renders this per-sandbox (see
# provider.rs, and the ingress policy noted in docs/kubernetes.md), but
# nothing did it for the control plane itself -- this pair of NetworkPolicy
# objects is that. Pods that scrape the authenticated metrics endpoint opt in
# with the `sandboxwich.dev/metrics-access: "true"` label; the companion allow
# policy below keeps metrics available without opening port 3217 namespace-wide.
#
# Scoped to this repo's own labeled workloads (app.kubernetes.io/part-of:
# sandboxwich -- the migrate Job above, this Deployment, and the worker
# Deployment in worker.yaml, which also runs in this namespace) rather than
# the whole namespace with an empty podSelector. That matters in this exact
# namespace: deploy/kubernetes/kind-conformance.sh stands up an ad hoc,
# unlabeled Postgres Deployment/Service directly in "sandboxwich" for CI
# only, and a namespace-wide default deny would also strip its ingress and
# break that database connection. Production deployments point
# SANDBOXWICH_DATABASE_URL at an external, separately managed Postgres (see
# the example in docs/kubernetes.md) -- there is no Postgres manifest owned
# by this repo to write ingress (or egress) rules for.
#
# Ingress only, no `Egress` policyType: these pods make outbound calls to
# destinations that vary per deployment and aren't fully known here (an
# external Postgres host, the in-cluster kube-apiserver for kubectl-based
# provider apply, image registries, cluster DNS). Getting egress
# CIDRs/selectors wrong risks silently breaking a working deployment with no
# clear symptom. Ingress is the narrow, fully-known surface instead: exactly
# one thing calls into these pods over the pod network (the worker calling
# the api Service on 3217) plus kubelet's own probes, so ingress-only default
# deny is both correct and safe to express without guessing at egress
# destinations.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandboxwich-control-plane-default-deny-ingress
  namespace: sandboxwich
  labels:
    app.kubernetes.io/part-of: sandboxwich
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: sandboxwich
  policyTypes:
    - Ingress
  ingress: []
---
# Narrow allow carved out of the default-deny above via a second NetworkPolicy
# (NetworkPolicies selecting the same pod are additive, so this only adds an
# allowance rather than reopening everything): the worker Deployment
# (worker.yaml, same namespace) and explicitly labeled metrics scrapers may
# reach the api Deployment on port 3217.
# The migrate Job and the worker Deployment itself take no inbound traffic at
# all, so they are covered by the default-deny policy above and get no
# corresponding allow rule here.
#
# kubelet liveness/readiness probes (defined on the api Deployment above) are
# not affected by this: they originate from the kubelet process on the node
# connecting to the Pod IP directly, not from another pod's network identity,
# and policy-enforcing CNIs (Calico, Cilium, etc.) special-case that exact
# traffic specifically so default-deny policies cannot fail node health
# checks. `kubectl port-forward` (used by
# deploy/kubernetes/kind-conformance.sh to reach the api Service from outside
# the cluster) is unaffected for the same underlying reason: it tunnels
# through the API server/kubelet straight into the target pod and never
# traverses the CNI's pod-to-pod network path that NetworkPolicy governs.
# Separately, kind's default CNI (kindnet) does not enforce NetworkPolicy at
# all, so in that specific CI job these two policies are inert (applied, but
# not enforced) -- they matter on any real deployment using a policy-aware
# CNI, which is what this manifest is written for.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandboxwich-api-allow-worker
  namespace: sandboxwich
  labels:
    app.kubernetes.io/part-of: sandboxwich
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sandboxwich-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: sandboxwich-worker
        - podSelector:
            matchLabels:
              sandboxwich.dev/metrics-access: "true"
      ports:
        - protocol: TCP
          port: 3217
