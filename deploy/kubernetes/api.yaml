---
apiVersion: v1
kind: Namespace
metadata:
  name: sandboxwich
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sandboxwich-api-migrate
  namespace: sandboxwich
  labels:
    app.kubernetes.io/name: sandboxwich-api-migrate
    app.kubernetes.io/part-of: sandboxwich
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandboxwich-api-migrate
        app.kubernetes.io/part-of: sandboxwich
    spec:
      restartPolicy: OnFailure
      # Runs to completion once and exits; no signal handling to worry about,
      # but it gets the same pod/container hardening as the long-running api
      # Deployment below since it's the same image.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/evalops/sandboxwich-api:latest
          # TODO(follow-up): pin to the sha-<12> tag containers.yml already
          # publishes instead of floating :latest, so deploys correlate to a
          # commit. Always at least forces a pull instead of trusting a
          # node's cached (possibly stale) :latest image.
          imagePullPolicy: Always
          args:
            - migrate
          env:
            - name: SANDBOXWICH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sandboxwich-secrets
                  key: database-url
            - name: SANDBOXWICH_DATABASE_MAX_CONNECTIONS
              value: "2"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandboxwich-api
  namespace: sandboxwich
  labels:
    app.kubernetes.io/name: sandboxwich-api
    app.kubernetes.io/part-of: sandboxwich
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sandboxwich-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandboxwich-api
        app.kubernetes.io/part-of: sandboxwich
    spec:
      # Bounds how long Kubernetes waits after sending SIGTERM before it force
      # kills (SIGKILL) the pod. The api now handles SIGTERM by draining
      # in-flight axum connections (see shutdown_signal()/with_graceful_shutdown
      # in main.rs); this gives that drain a real window instead of the default
      # 30s being an implicit, undocumented coincidence.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/evalops/sandboxwich-api:latest
          # TODO(follow-up): pin to the sha-<12> tag containers.yml already
          # publishes instead of floating :latest, so deploys correlate to a
          # commit. Always at least forces a pull instead of trusting a
          # node's cached (possibly stale) :latest image.
          imagePullPolicy: Always
          env:
            - name: SANDBOXWICH_BIND
              value: 0.0.0.0:3217
            - name: SANDBOXWICH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sandboxwich-secrets
                  key: database-url
            - name: SANDBOXWICH_AUTO_MIGRATE
              value: "false"
            - name: SANDBOXWICH_DATABASE_MAX_CONNECTIONS
              value: "10"
            - name: SANDBOXWICH_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sandboxwich-secrets
                  key: api-token
                  optional: true
            - name: SANDBOXWICH_DEFAULT_TENANT
              value: default
          ports:
            - name: http
              containerPort: 3217
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sandboxwich-api
  namespace: sandboxwich
  labels:
    app.kubernetes.io/name: sandboxwich-api
    app.kubernetes.io/part-of: sandboxwich
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sandboxwich-api
  ports:
    - name: http
      port: 3217
      targetPort: http
