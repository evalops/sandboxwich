---
# GH-76: sandboxes are provisioned into a dedicated namespace, separate
# from the control-plane namespace (sandboxwich) where the API, the
# sandboxwich-secrets Secret (SANDBOXWICH_DATABASE_URL, api-token), and the
# worker's own ServiceAccount live. The worker's RBAC below is scoped to
# this namespace only and grants nothing in the control-plane namespace,
# so a compromised worker (or an exec-path bug) cannot reach
# sandboxwich-api pods or the database credential.
apiVersion: v1
kind: Namespace
metadata:
  name: sandboxwich-sandboxes
  labels:
    app.kubernetes.io/part-of: sandboxwich
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandboxwich-worker
  namespace: sandboxwich
  labels:
    app.kubernetes.io/name: sandboxwich-worker
    app.kubernetes.io/part-of: sandboxwich
---
# NOTE: no Role/RoleBinding is granted to sandboxwich-worker in the
# sandboxwich (control-plane) namespace. All sandbox-manipulating
# permissions live in the sandboxwich-sandboxes Role/RoleBinding below.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandboxwich-worker
  namespace: sandboxwich-sandboxes
  labels:
    app.kubernetes.io/name: sandboxwich-worker
    app.kubernetes.io/part-of: sandboxwich
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - persistentvolumeclaims
      # GH-101: one Secret per sandbox, holding this worker's own
      # worker-scoped API token (GH-64), mounted read-only into that
      # sandbox's pod. Scoped to this namespace only, same as the other
      # sandbox-manipulating resources above -- a compromised worker can
      # still only touch secrets it creates in sandboxwich-sandboxes, never
      # the sandboxwich-secrets Secret in the control-plane namespace.
      - secrets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # pods/exec is scoped to "create" only, and to this namespace, which
  # contains nothing but sandbox pods. RBAC has no per-resource wildcard
  # for the dynamically-generated sandbox pod names, so namespace
  # isolation (rather than resourceNames) is what keeps this from being
  # usable against control-plane pods (GH-76).
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandboxwich-worker
  namespace: sandboxwich-sandboxes
  labels:
    app.kubernetes.io/name: sandboxwich-worker
    app.kubernetes.io/part-of: sandboxwich
subjects:
  - kind: ServiceAccount
    name: sandboxwich-worker
    namespace: sandboxwich
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandboxwich-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandboxwich-worker
  namespace: sandboxwich
  labels:
    app.kubernetes.io/name: sandboxwich-worker
    app.kubernetes.io/part-of: sandboxwich
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sandboxwich-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandboxwich-worker
        app.kubernetes.io/part-of: sandboxwich
    spec:
      serviceAccountName: sandboxwich-worker
      # Must exceed --drain-timeout-secs below so Kubernetes doesn't SIGKILL
      # the worker mid-drain: on SIGTERM/SIGINT the worker stops claiming new
      # leases and waits for any in-flight lease to finish, bounded by that
      # timeout, before exiting on its own.
      terminationGracePeriodSeconds: 330
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/evalops/sandboxwich-worker@sha256:45e661306ead0b59435c1141ab6d120f4dbdbab6ef70cfcdc80ce758cae5d0b9
          imagePullPolicy: IfNotPresent
          env:
            # kubectl (shelled out to by the apply provider) wants a writable
            # $HOME for its discovery cache. readOnlyRootFilesystem below
            # means that has to be redirected to the /tmp emptyDir.
            - name: HOME
              value: /tmp
            - name: SANDBOXWICH_API
              value: http://sandboxwich-api:3217
            # GH-64: this tenant-wide credential authenticates only the
            # `run` subcommand's initial `POST /workers/register` call.
            # Immediately after registering, the worker process mints and
            # switches internally to a worker-scoped token bound to its own
            # worker id, and uses that (never this value) for every
            # guest-facing call it makes afterward (heartbeat, lease
            # claim/renew/complete/fail/output) -- those routes reject
            # tenant-wide tokens outright.
            - name: SANDBOXWICH_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sandboxwich-secrets
                  key: api-token
                  optional: true
            - name: SANDBOXWICH_TENANT
              value: default
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SANDBOXWICH_CLUSTER
              value: k3s-dev
            - name: SANDBOXWICH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # GH-76: sandboxes render into a dedicated namespace, separate
            # from SANDBOXWICH_NAMESPACE (the control-plane namespace the
            # worker pod itself runs in). Must match the Namespace/Role/
            # RoleBinding above.
            - name: SANDBOXWICH_SANDBOX_NAMESPACE
              value: sandboxwich-sandboxes
            - name: SANDBOXWICH_STORAGE_CLASS
              value: local-path
            - name: SANDBOXWICH_SNAPSHOT_CLASS
              value: ""
            - name: SANDBOXWICH_WORKSPACE_STORAGE
              value: 2Gi
            - name: SANDBOXWICH_SSH_AUTHORIZED_KEYS_SECRET
              value: ""
            - name: SANDBOXWICH_VNC_PASSWORD_SECRET
              value: ""
            - name: SANDBOXWICH_RUNTIME_CLASS_NAME
              value: ""
            # Required in apply mode: the worker refuses to start without an
            # explicit guest image so kind/local clusters cannot silently fall
            # back to a private ghcr.io default and ImagePullBackOff.
            - name: SANDBOXWICH_RUNTIME_IMAGE
              value: ghcr.io/evalops/sandboxwich-ubuntu-dev:latest
            # SECURITY NOTE (GH-76): this sets both halves of the mutation
            # double opt-in (this env var and --confirm-apply below)
            # permanently ON in this deployment. That is a deliberate,
            # documented choice, not an accident: the worker's entire job
            # in apply mode is to create/delete sandbox resources, so a
            # deployment of this manifest with the gate closed cannot
            # process any work. The gate still protects every other
            # context (local runs, CI, provider-apply-smoke), where both
            # halves must be supplied explicitly.
            #
            # The contract for operators of THIS manifest:
            #   - mutations are confined to the sandbox namespace above
            #     (sandboxwich-sandboxes) by the worker's RBAC; the gate is
            #     not what protects the control plane, the Role scoping is.
            #   - the worker logs a startup warning whenever both halves
            #     are force-enabled, so this state is visible in pod logs,
            #     not only in this comment.
            #   - to run a worker that can never mutate the cluster, remove
            #     this env var (or --confirm-apply) and switch
            #     --provider-mode to dry-run.
            - name: SANDBOXWICH_K8S_ENABLE_MUTATION
              value: "1"
          args:
            - run
            - --name
            - $(POD_NAME)
            - --provider
            - kubernetes
            - --provider-mode
            - apply
            - --confirm-apply
            - --kubectl-context
            - in-cluster
            - --cluster
            - $(SANDBOXWICH_CLUSTER)
            - --namespace
            - $(SANDBOXWICH_NAMESPACE)
            - --sandbox-namespace
            - $(SANDBOXWICH_SANDBOX_NAMESPACE)
            - --storage-class
            - $(SANDBOXWICH_STORAGE_CLASS)
            - --snapshot-class
            - $(SANDBOXWICH_SNAPSHOT_CLASS)
            - --workspace-storage
            - $(SANDBOXWICH_WORKSPACE_STORAGE)
            - --ssh-authorized-keys-secret
            - $(SANDBOXWICH_SSH_AUTHORIZED_KEYS_SECRET)
            - --vnc-password-secret
            - $(SANDBOXWICH_VNC_PASSWORD_SECRET)
            - --runtime-class-name
            - $(SANDBOXWICH_RUNTIME_CLASS_NAME)
            - --ingress-namespace
            - $(SANDBOXWICH_NAMESPACE)
            - --label
            - cluster=$(SANDBOXWICH_CLUSTER)
            - --label
            - pod=$(POD_NAME)
            # Kept comfortably under terminationGracePeriodSeconds above so the
            # worker's own drain logic (not Kubernetes' SIGKILL) is what ends
            # the process in the common case.
            - --drain-timeout-secs
            - "300"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir: {}
