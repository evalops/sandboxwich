---
name: ci

"on":
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: sandboxwich
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace
      - run: cargo test --workspace
        env:
          SANDBOXWICH_TEST_POSTGRES_URL: >-
            postgres://postgres:postgres@localhost:5432/sandboxwich
      - run: |
          cargo build \
            -p sandboxwich-api \
            -p sandboxwich-worker \
            -p sandboxwich-bench
      - name: Generate benchmark report
        run: |
          cargo run -p sandboxwich-bench -- all \
            --api-bin target/debug/sandboxwich-api \
            --worker-bin target/debug/sandboxwich-worker \
            --runs 5 \
            --ttft-runs 10 \
            --requests 300 \
            --concurrency 25 \
            --seed-sandboxes 250 \
            > sandboxwich-benchmark-report.md
      - uses: actions/upload-artifact@v4
        with:
          name: sandboxwich-benchmark-report
          path: sandboxwich-benchmark-report.md

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-audit
      # RUSTSEC-2023-0071 (rsa timing sidechannel) comes in transitively via
      # sqlx-mysql, which is part of sqlx's dependency graph even though
      # this workspace only enables the postgres/sqlite sqlx features.
      # Upstream has no fixed version yet; re-evaluate when one ships.
      - run: cargo audit --ignore RUSTSEC-2023-0071
