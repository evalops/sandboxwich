name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - bootstrap/sandwich

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v3
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace
      - run: cargo test --workspace
