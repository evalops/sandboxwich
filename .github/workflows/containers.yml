name: containers

on:
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/containers.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "Dockerfile"
      - "crates/**"
      - "deploy/runtime/ubuntu-dev/**"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: evalops

jobs:
  service-images:
    name: service image (${{ matrix.bin }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - bin: sandboxwich-api
            image: sandboxwich-api
          - bin: sandboxwich-worker
            image: sandboxwich-worker
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          image="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.image }}"
          {
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Build service image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BIN=${{ matrix.bin }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/evalops/sandboxwich
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
        if: github.event_name != 'pull_request'
      - name: Sign service image
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  runtime-image:
    name: runtime image (ubuntu-dev)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          image="${REGISTRY}/${IMAGE_NAMESPACE}/sandboxwich-ubuntu-dev"
          {
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Build runtime image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: deploy/runtime/ubuntu-dev
          file: deploy/runtime/ubuntu-dev/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/evalops/sandboxwich
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=sandboxwich-ubuntu-dev
          cache-to: type=gha,mode=max,scope=sandboxwich-ubuntu-dev
          provenance: mode=max
          sbom: true
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
        if: github.event_name != 'pull_request'
      - name: Sign runtime image
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sandboxwich-ubuntu-dev
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
