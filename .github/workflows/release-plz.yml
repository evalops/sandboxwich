name: release-plz

"on":
  push:
    branches:
      - main

# RELEASE_BOT_TOKEN (a PAT with contents + pull-requests access) is required
# for the fully automated flow: events caused by the default GITHUB_TOKEN do
# not trigger other workflows, so without it the release PR gets no CI runs
# and the tag push does not start release.yml. Both jobs fall back to
# GITHUB_TOKEN so the workflow still functions with manual kicks; see
# RELEASING.md.

jobs:
  release-plz-release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      # persist-credentials must stay off: release-plz authenticates its git
      # and API operations with GITHUB_TOKEN from the env below, and checkout's
      # persisted credentials would shadow the PAT.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # One release PR update per branch at a time. Not cancelled in progress:
    # a superseded run must finish rather than leave a half-updated PR.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
