name: bump-version

"on":
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level (patch, minor, major) or explicit version (e.g., 0.2.0)"
        required: true
        default: "patch"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Create release PR
    runs-on: ubuntu-latest
    steps:
      # RELEASE_BOT_TOKEN is optional. If provided, the created release PR will
      # trigger normal CI workflows; with only GITHUB_TOKEN, CI on the release
      # PR must be triggered separately (e.g., by pushing an empty commit).
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - uses: taiki-e/install-action@56f527ce5f0c778165d7ba9409086ccf5c910b6d
        with:
          tool: cargo-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump workspace version (no push/tag)
        run: cargo release ${{ inputs.bump }} --execute --no-publish --no-verify --no-confirm --no-push --no-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract new version
        id: version
        run: |
          version="$(grep -m1 '^version = ' crates/sandboxwich-core/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Push release branch and open PR
        run: |
          version="${{ steps.version.outputs.version }}"
          branch="release/v${version}"
          git checkout -b "${branch}"
          git push origin "${branch}"
          url="$(gh pr create \
            --title "chore(release): prepare for ${version}" \
            --body "Automated version bump to ${version}.\n\nMerging this PR will trigger the tag-release workflow, which pushes \\`v${version}\\` and starts the release build." \
            --base main \
            --head "${branch}")"
          echo "pr_url=${url}" >> "${GITHUB_OUTPUT}"
          # Enable auto-merge if the repository allows it; otherwise the PR
          # can be merged manually.
          gh pr merge "${url}" --auto --merge || true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
