name: bump-version

"on":
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level (patch, minor, major) or explicit version (e.g., 0.2.0)"
        required: true
        default: "patch"
        type: string

permissions:
  contents: write

jobs:
  bump:
    name: Bump version and push tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - uses: taiki-e/install-action@56f527ce5f0c778165d7ba9409086ccf5c910b6d
        with:
          tool: cargo-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump workspace version and push tag
        run: cargo release ${{ inputs.bump }} --execute --no-publish --no-verify --no-confirm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
