name: kubernetes-conformance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kubernetes-conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kind:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install pinned kind
        run: |
          curl -fsSLo kind https://kind.sigs.k8s.io/dl/v0.29.0/kind-linux-amd64
          echo c72eda46430f065fb45c5f70e7c957cc9209402ef309294821978677c8fb3284  kind | sha256sum --check
          sudo install -m 0755 kind /usr/local/bin/kind
      - name: Build conformance binaries and images
        run: |
          cargo build -p sandboxwich-worker
          docker buildx build --load --build-arg BIN=sandboxwich-api \
            --cache-from type=gha,scope=kind-api \
            --cache-to type=gha,mode=max,scope=kind-api \
            -t sandboxwich-api:conformance .
          docker buildx build --load --build-arg BIN=sandboxwich-worker \
            --cache-from type=gha,scope=kind-worker \
            --cache-to type=gha,mode=max,scope=kind-worker \
            -t sandboxwich-worker:conformance .
          docker buildx build --load \
            --cache-from type=gha,scope=kind-runtime \
            --cache-to type=gha,mode=max,scope=kind-runtime \
            -t sandboxwich-runtime:conformance deploy/runtime/ubuntu-dev
          docker buildx build --load -f deploy/kubernetes/postgres.Dockerfile \
            --cache-from type=gha,scope=kind-postgres \
            --cache-to type=gha,mode=max,scope=kind-postgres \
            -t postgres:conformance .
          # kind imports the completed images into containerd, temporarily storing a
          # second copy of every layer. The intermediate BuildKit cache is no longer
          # needed after these builds and can exhaust the runner during that import.
          docker builder prune --all --force
      - name: Create disposable cluster
        run: >-
          kind create cluster --name sandboxwich-conformance
          --config deploy/kubernetes/kind-conformance.yaml --wait 120s
      - name: Publish digest-pinned runtime images to the disposable registry
        run: |
          docker run -d --restart=always -p 127.0.0.1:5001:5000 \
            --name sandboxwich-kind-registry registry:2
          docker network connect kind sandboxwich-kind-registry
          for node in $(kind get nodes --name sandboxwich-conformance); do
            docker exec "${node}" mkdir -p /etc/containerd/certs.d/localhost:5001
            printf '%s\n' \
              'server = "http://sandboxwich-kind-registry:5000"' \
              '[host."http://sandboxwich-kind-registry:5000"]' \
              '  capabilities = ["pull", "resolve"]' | \
              docker exec -i "${node}" tee \
                /etc/containerd/certs.d/localhost:5001/hosts.toml >/dev/null
          done
          docker tag sandboxwich-worker:conformance \
            localhost:5001/sandboxwich-worker:conformance
          docker tag sandboxwich-runtime:conformance \
            localhost:5001/sandboxwich-runtime:conformance
          docker push localhost:5001/sandboxwich-worker:conformance
          docker push localhost:5001/sandboxwich-runtime:conformance
          gateway_image="$(docker image inspect localhost:5001/sandboxwich-worker:conformance \
            --format '{{range .RepoDigests}}{{println .}}{{end}}' | head -n1)"
          runtime_image="$(docker image inspect localhost:5001/sandboxwich-runtime:conformance \
            --format '{{range .RepoDigests}}{{println .}}{{end}}' | head -n1)"
          [[ "${gateway_image}" == *@sha256:* ]]
          [[ "${runtime_image}" == *@sha256:* ]]
          for node in $(kind get nodes --name sandboxwich-conformance); do
            docker exec "${node}" crictl pull "${gateway_image}"
            docker exec "${node}" crictl pull "${runtime_image}"
          done
          echo "SANDBOXWICH_GATEWAY_IMAGE=${gateway_image}" >>"${GITHUB_ENV}"
          echo "SANDBOXWICH_RUNTIME_IMAGE=${runtime_image}" >>"${GITHUB_ENV}"
      - name: Run live conformance and chaos checks
        run: deploy/kubernetes/kind-conformance.sh
      - name: Collect cluster diagnostics
        if: failure()
        run: |
          kubectl get all -A -o wide
          kubectl get events -A --sort-by=.lastTimestamp
          kubectl -n sandboxwich logs deployment/sandboxwich-api --tail=-1 --prefix || true
          kubectl -n sandboxwich logs deployment/sandboxwich-api --previous --tail=-1 --prefix || true
          kubectl -n sandboxwich logs deployment/sandboxwich-worker --tail=-1 --prefix || true
      - name: Delete disposable cluster
        if: always()
        run: |
          kind delete cluster --name sandboxwich-conformance
          docker rm -f sandboxwich-kind-registry >/dev/null 2>&1 || true

  cilium-fqdn:
    name: cilium-fqdn
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install pinned kind
        run: |
          curl -fsSLo kind https://kind.sigs.k8s.io/dl/v0.29.0/kind-linux-amd64
          echo c72eda46430f065fb45c5f70e7c957cc9209402ef309294821978677c8fb3284  kind | sha256sum --check
          sudo install -m 0755 kind /usr/local/bin/kind
      - name: Create Cilium cluster
        run: kind create cluster --name sandboxwich-cilium --config deploy/kubernetes/kind-cilium.yaml
      - name: Install Cilium
        run: |
          helm repo add cilium https://helm.cilium.io/
          helm repo update
          helm install cilium cilium/cilium --version 1.17.6 --namespace kube-system \
            --set ipam.mode=kubernetes \
            --set kubeProxyReplacement=true
          kubectl -n kube-system rollout status daemonset/cilium --timeout=300s
          kubectl wait nodes --all --for=condition=Ready --timeout=300s
      - name: Run Cilium FQDN conformance
        run: deploy/kubernetes/cilium-fqdn-conformance.sh
      - name: Collect Cilium diagnostics
        if: failure()
        run: |
          kubectl get nodes,pods -A -o wide
          kubectl -n kube-system logs daemonset/cilium --tail=200 || true
          kubectl get ciliumnetworkpolicies -A -o yaml || true
      - name: Delete Cilium cluster
        if: always()
        run: kind delete cluster --name sandboxwich-cilium
